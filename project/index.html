<!DOCTYPE html>
<html lang="en" class="w-full h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-black w-full h-full flex justify-center items-center">
    <main class="w-[80%] min-h-[60vh] bg-gray-800 text-white flex flex-col p-10 items-center gap-10 rounded-3xl">
        <div class="inp flex gap-10">
            <input type="text" class="outline-none bg-white text-black text-xl rounded-lg py-1 pl-3 pr-8"
                placeholder="Add to do">
            <button class="add text-base py-1 px-6 bg-blue-400 rounded-2xl">Add</button>
        </div>

        <div class="todo-list w-full mt-10 flex justify-center items-center flex-col gap-5 ">
          
        </div>

    </main>

    <script src="./script.js"></script>
</body>

</html>
